<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议管理 - 外联教授数据库管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-title">📊 外联数据库</div>
            <ul class="sidebar-menu">
                <li @click="goPage('')"><span>📈</span> 仪表盘</li>
                <li @click="goPage('professors')"><span>👨‍🏫</span> 教授管理</li>
                <li class="active"><span>📅</span> 会议管理</li>
                <li @click="goPage('cooperations')"><span>🤝</span> 合作记录</li>
                <li @click="goPage('directions')"><span>🏷️</span> 研究方向</li>
                <li @click="goPage('import_export')"><span>📂</span> 导入导出</li>
            </ul>
        </div>
        <div class="main-area">
            <div class="header">
                <div class="header-left">会议管理</div>
                <div class="header-right">
                    <span>管理员</span>
                    <el-button size="small" type="danger" plain @click="logout">退出登录</el-button>
                </div>
            </div>
            <div class="content">
                <el-card shadow="never">
                    <el-form :model="filters" inline>
                        <el-form-item label="搜索">
                            <el-input v-model="filters.search" placeholder="会议名称/领域" clearable @clear="search" @keyup.enter="search" style="width:200px" />
                        </el-form-item>
                        <el-form-item label="领域方向">
                            <el-select v-model="filters.field" placeholder="全部" clearable @change="search" style="width:150px" filterable>
                                <el-option v-for="d in directions" :key="d" :label="d" :value="d" />
                            </el-select>
                        </el-form-item>
                        <el-form-item label="年份">
                            <el-input-number v-model="filters.year" :min="2000" :max="2100" style="width:120px" controls-position="right" placeholder="年份" />
                        </el-form-item>
                        <el-form-item label="状态">
                            <el-select v-model="filters.status" placeholder="全部" clearable @change="search" style="width:120px">
                                <el-option label="计划中" value="planned" />
                                <el-option label="进行中" value="ongoing" />
                                <el-option label="已结束" value="completed" />
                            </el-select>
                        </el-form-item>
                        <el-form-item>
                            <el-button type="primary" @click="search">查询</el-button>
                            <el-button @click="resetFilters">重置</el-button>
                            <el-button type="success" @click="showAddDialog">+ 新增会议</el-button>
                        </el-form-item>
                    </el-form>
                </el-card>

                <el-card shadow="never" style="margin-top:16px">
                    <el-table :data="list" stripe style="width:100%" v-loading="loading" @row-click="goDetail">
                        <el-table-column type="index" label="#" width="50" />
                        <el-table-column prop="name" label="会议名称" min-width="200" show-overflow-tooltip />
                        <el-table-column prop="year" label="年份" width="70" align="center" />
                        <el-table-column prop="field" label="领域" width="120">
                            <template #default="{row}"><el-tag size="small" v-if="row.field" @click.stop="filterField(row.field)" style="cursor:pointer">{{ row.field }}</el-tag></template>
                        </el-table-column>
                        <el-table-column label="状态" width="90">
                            <template #default="{row}">{{ CONF_STATUS_LABELS[row.status] || row.status }}</template>
                        </el-table-column>
                        <el-table-column label="分会场" width="120" align="center">
                            <template #default="{row}">
                                <span :style="{color: row.total_subconferences > 0 && row.assigned_subconferences === row.total_subconferences ? '#67c23a' : '#f56c6c'}">
                                    {{ row.assigned_subconferences || 0 }} / {{ row.total_subconferences || 0 }}
                                </span>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="160" fixed="right">
                            <template #default="{row}">
                                <el-button size="small" type="primary" link @click.stop="goDetail(row)">详情</el-button>
                                <el-button size="small" type="warning" link @click.stop="showEditDialog(row)">编辑</el-button>
                                <el-button size="small" type="danger" link @click.stop="doDelete(row)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center">
                        <span style="font-size:13px;color:#909399">共 {{ total }} 条</span>
                        <el-pagination v-model:current-page="filters.page" :page-size="filters.page_size" :total="total" layout="prev,pager,next" @current-change="loadData" />
                    </div>
                </el-card>
            </div>
        </div>
    </div>

    <el-dialog v-model="dialogVisible" :title="dialogTitle" width="600px">
        <el-form :model="form" label-width="110px">
            <el-row :gutter="16">
                <el-col :span="16"><el-form-item label="会议名称" required><el-input v-model="form.name" /></el-form-item></el-col>
                <el-col :span="8"><el-form-item label="年份"><el-input-number v-model="form.year" :min="2000" :max="2100" style="width:100%" controls-position="right" /></el-form-item></el-col>
            </el-row>
            <el-row :gutter="16">
                <el-col :span="12"><el-form-item label="举办地点"><el-input v-model="form.location" /></el-form-item></el-col>
                <el-col :span="12">
                    <el-form-item label="领域方向">
                        <el-select v-model="form.field" filterable allow-create style="width:100%" placeholder="输入或选择">
                            <el-option v-for="d in directions" :key="d" :label="d" :value="d" />
                        </el-select>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-row :gutter="16">
                <el-col :span="12">
                    <el-form-item label="状态">
                        <el-select v-model="form.status" style="width:100%">
                            <el-option label="计划中" value="planned" />
                            <el-option label="进行中" value="ongoing" />
                            <el-option label="已结束" value="completed" />
                        </el-select>
                    </el-form-item>
                </el-col>
                <el-col :span="12"><el-form-item label="计划分会场数"><el-input-number v-model="form.total_sessions" :min="0" style="width:100%" controls-position="right" /></el-form-item></el-col>
            </el-row>
            <el-form-item label="描述"><el-input v-model="form.description" type="textarea" :rows="2" /></el-form-item>
            <el-form-item label="备注"><el-input v-model="form.notes" type="textarea" :rows="2" /></el-form-item>
        </el-form>
        <template #footer>
            <el-button @click="dialogVisible = false">取消</el-button>
            <el-button type="primary" :loading="saving" @click="save">保存</el-button>
        </template>
    </el-dialog>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script src="/static/app.js"></script>
<script>
    const { createApp, ref, reactive, onMounted } = Vue;
    const app = createApp({
        setup() {
            if (!checkAuth()) return {};
            const list = ref([]);
            const total = ref(0);
            const loading = ref(false);
            const directions = ref([]);
            const dialogVisible = ref(false);
            const dialogTitle = ref('新增会议');
            const saving = ref(false);
            const isEdit = ref(false);
            const editId = ref(null);
            const filters = reactive({ search: '', field: '', year: null, status: '', page: 1, page_size: 50 });
            const form = reactive({ name: '', year: null, location: '', field: '', description: '', status: 'planned', total_sessions: 0, notes: '' });

            async function loadData() {
                loading.value = true;
                try {
                    const res = await getApi('/conferences', filters);
                    list.value = res.items;
                    total.value = res.total;
                } catch (e) { console.error(e); }
                loading.value = false;
            }

            async function loadDirections() {
                try { directions.value = await getApi('/directions/suggestions'); } catch (e) {}
            }

            function search() { filters.page = 1; loadData(); }
            function resetFilters() { filters.search = ''; filters.field = ''; filters.year = null; filters.status = ''; filters.page = 1; search(); }
            function filterField(f) { filters.field = f; filters.page = 1; loadData(); }

            function showAddDialog() {
                isEdit.value = false; editId.value = null;
                dialogTitle.value = '新增会议';
                Object.assign(form, { name: '', year: null, location: '', field: '', description: '', status: 'planned', total_sessions: 0, notes: '' });
                dialogVisible.value = true;
            }

            function showEditDialog(row) {
                isEdit.value = true; editId.value = row.id;
                dialogTitle.value = '编辑会议';
                Object.assign(form, {
                    name: row.name, year: row.year, location: row.location || '', field: row.field || '',
                    description: row.description || '', status: row.status || 'planned',
                    total_sessions: row.total_sessions || 0, notes: row.notes || '',
                });
                dialogVisible.value = true;
            }

            async function save() {
                if (!form.name) { ElMessage.warning('请输入会议名称'); return; }
                saving.value = true;
                try {
                    if (isEdit.value) {
                        await putApi(`/conferences/${editId.value}`, form);
                        ElMessage.success('更新成功');
                    } else {
                        await postApi('/conferences', form);
                        ElMessage.success('创建成功');
                    }
                    dialogVisible.value = false;
                    loadData();
                    loadDirections();
                } catch (e) {}
                saving.value = false;
            }

            async function doDelete(row) {
                try {
                    await ElMessageBox.confirm(`确定删除会议「${row.name}」？`, '确认删除', { type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消' });
                    await deleteApi(`/conferences/${row.id}`);
                    ElMessage.success('删除成功');
                    loadData();
                } catch (e) {}
            }

            function goDetail(row) { window.location.href = `/pages/conference_detail?id=${row.id}`; }
            function goPage(name) { window.location.href = name ? `/pages/${name}` : '/'; }
            function logout() { clearToken(); window.location.href = '/login'; }

            onMounted(() => { loadData(); loadDirections(); });

            return { list, total, loading, filters, directions, dialogVisible, dialogTitle, saving, form, search, resetFilters, showAddDialog, showEditDialog, save, doDelete, goDetail, goPage, logout, filterField, CONF_STATUS_LABELS };
        }
    });
    app.use(ElementPlus);
    app.mount('#app');
</script>
</body>
</html>
