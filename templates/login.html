<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 外联教授数据库管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        body { margin: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Helvetica Neue', sans-serif; }
        .login-card { width: 400px; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
        .login-title { text-align: center; margin-bottom: 32px; font-size: 24px; color: #303133; font-weight: 600; }
        .login-subtitle { text-align: center; margin-bottom: 24px; font-size: 14px; color: #909399; }
    </style>
</head>
<body>
    <div id="app">
        <el-card class="login-card" shadow="never">
            <div class="login-title">外联教授数据库</div>
            <div class="login-subtitle">请登录以继续</div>
            <el-form :model="form" @submit.prevent="doLogin" label-width="0">
                <el-form-item>
                    <el-input v-model="form.username" placeholder="用户名" size="large" prefix-icon="User" />
                </el-form-item>
                <el-form-item>
                    <el-input v-model="form.password" type="password" placeholder="密码" size="large" prefix-icon="Lock" show-password @keyup.enter="doLogin" />
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" size="large" style="width:100%" :loading="loading" @click="doLogin">登 录</el-button>
                </el-form-item>
            </el-form>
            <div style="text-align:center;font-size:12px;color:#c0c4cc;margin-top:16px">请联系管理员获取账号</div>
        </el-card>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
    <script src="/static/app.js"></script>
    <script>
        const { createApp, ref } = Vue;
        const { ElMessage } = ElementPlus;
        const app = createApp({
            setup() {
                const form = ref({ username: '', password: '' });
                const loading = ref(false);
                const doLogin = async () => {
                    if (!form.value.username || !form.value.password) {
                        ElMessage.warning('请输入用户名和密码');
                        return;
                    }
                    loading.value = true;
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(form.value),
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.detail || '登录失败');
                        setToken(data.access_token);
                        ElMessage.success('登录成功');
                        window.location.href = '/';
                    } catch (e) {
                        ElMessage.error(e.message);
                    } finally {
                        loading.value = false;
                    }
                };
                return { form, loading, doLogin };
            }
        });
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
